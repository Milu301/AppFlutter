name: cobrosapp
description: COBROSAPP - Sistema de cobranzas (Android first)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0 
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  device_info_plus: ^10.1.2
  geolocator: ^12.0.0
  android_id: ^0.4.0
  crypto: ^3.0.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/icons/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
